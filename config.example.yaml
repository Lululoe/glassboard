# Glassboard Configuration
# Copy this file to config.yaml and customize it for your setup.
#   cp config.example.yaml config.yaml

theme: "default"
themes: []

pages:
  - id: home
    name: "Home"
    cards:
      - id: weather
        type: weather
        colSpan: 2
        entity_id: "weather.forecast_home"

      - id: appgrid
        type: appgrid
        colSpan: 1

      - id: media_center
        type: media
        colSpan: 3
        primaryColor: "#f078f0"

      - id: transmission
        type: transmission
        colSpan: 3
        url: "http://transmission.local:9091"
        downloadsUrl: "http://downloads.local"
        primaryColor: "#f02520"

  - id: admin
    name: "Server"
    cards:

      - id: server_stats
        type: serverstats
        colSpan: 2
        data:
          sensors: ["cpu", "ram", "storage", "network", "temp"]

      - id: proxmox_cluster
        type: proxmox
        colSpan: 1
        url: "https://proxmox.local:8006"
        primaryColor: "#e57000"

      - id: github_prs
        type: git
        colSpan: 3
        filterStatus: ['open']
        repositories:
          - type: "github"
            owner: "your-username"
            repo: "your-repo"

  # Example: Embed an external page as an iframe
  # - id: example_iframe
  #   name: "Status Page"
  #   type: iframe
  #   url: "https://status.example.com"

launcher:
  apps:
    - name: "Home Assistant"
      url: "https://homeassistant.local:8123"
      icon:
        source: "sh"
        value: "home-assistant-light"
      bgColor: "linear-gradient(45deg,rgba(3, 169, 244, 1) 0%, rgba(3, 236, 244, 1) 50%, rgba(3, 244, 196, 1) 100%)"
    - name: "Mealie"
      url: "https://mealie.local"
      icon:
        source: "sh"
        value: "mealie"
        color: "white"
