    - name: "Paperless"
      url: "https://paperless.local"
      icon:
        source: "lucide"
        value: "Leaf"
      bgColor: "linear-gradient(45deg,rgba(13, 161, 55, 1) 3%, rgba(0, 255, 38, 1) 100%)"
    - name: "Transmission"
      url: "https://transmission.local"
      icon:
        source: "sh"
        value: "transmission"
    - name: "Sonarr"
      url: "https://sonarr.local"
      icon:
        source: "sh"
        value: "sonarr"
    - name: "Radarr"
      url: "https://radarr.local"
      icon:
        source: "sh"
        value: "radarr-light-hybrid"
    - name: "Prowlarr"
      url: "https://prowlarr.local"
      icon:
        source: "sh"
        value: "prowlarr"
    - name: "Plex"
      url: "https://plex.local:32400"
      icon:
        source: "sh"
        value: "plex"
    - name: "Grafana"
      url: "https://grafana.local:3000"
