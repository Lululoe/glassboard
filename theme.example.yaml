        "--color-primary": "#0a84ff"
        "--color-primary-light": "#60a5fa"
        "--color-primary-dark": "#0050d5"
        "--color-secondary": "#7A43B6"
        "--color-secondary-light": "#BE57F2"
        "--color-secondary-dark": "#5e328c"
        "--color-tertiary": "#F05050"
        "--color-tertiary-light": "#F09550"
        "--color-tertiary-dark": "#c43e3e"
        "--color-quaternary": "#24A69B"
        "--color-quaternary-light": "#31E07A"
        "--color-quaternary-dark": "#1a7f75"
